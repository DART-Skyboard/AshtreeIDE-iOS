name: AshtreeIDE-iOS
options:
  bundleIdPrefix: DART-Meadow-LLC
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: DART-Meadow-LLC.AshtreeIDE
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.10"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "iPhone Distribution"
    PROVISIONING_PROFILE: "3d6f3884-df17-4871-afc1-e1edcedc7335"
    DEVELOPMENT_TEAM: L7AHWS9Q6V
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"

targets:
  AshtreeIDE-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/AshtreeIDEApp
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_NAME: AshtreeIDE
        INFOPLIST_FILE: Sources/AshtreeIDEApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/AshtreeIDEApp/AshtreeIDE.entitlements
    entitlements:
      path: Sources/AshtreeIDEApp/AshtreeIDE.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.network.client: true
        keychain-access-groups:
          - $(AppIdentifierPrefix)DART-Meadow-LLC.AshtreeIDE
