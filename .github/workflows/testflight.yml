name: Build & Deploy Ash Tree IDE to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Ash Tree IDE to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version

      - name: Install ASC API key
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys ~/private_keys ~/.private_keys
          printf '%s' "$ASC_KEY" > ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8
          cp ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8 ~/private_keys/
          cp ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8 ~/.private_keys/
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8
          echo "Key: $(wc -c < ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8) bytes"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_PATH="$RUNNER_TEMP/ashtree.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          PP_UUID=$(security cms -D -i "$PP_PATH" 2>/dev/null | \
            plutil -extract UUID raw - 2>/dev/null || echo "")
          echo "Profile UUID: $PP_UUID"
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"${PP_UUID}.mobileprovision"
          echo "PROFILE_UUID=$PP_UUID" >> $GITHUB_ENV

      - name: Install xcodegen 2.42.0
        run: |
          curl -sL https://github.com/yonaskolb/XcodeGen/releases/download/2.42.0/xcodegen.zip \
            -o /tmp/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen_bin
          sudo cp /tmp/xcodegen_bin/xcodegen/bin/xcodegen /usr/local/bin/xcodegen
          xcodegen version

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Bump build number
        run: |
          BUILD=$(date +%Y%m%d%H%M)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" \
            Sources/AshtreeIDEApp/Info.plist
          echo "BUILD_NUMBER=$BUILD" >> $GITHUB_ENV

      - name: Archive
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project AshtreeIDE-iOS.xcodeproj \
            -scheme AshtreeIDE-iOS \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/AshtreeIDE.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8" \
            -authenticationKeyID "NQXQ595W59" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM=L7AHWS9Q6V \
            CODE_SIGN_STYLE=Automatic
          ls -la "$RUNNER_TEMP/AshtreeIDE.xcarchive"

      - name: Export IPA
        run: |
          ARCHIVE="$RUNNER_TEMP/AshtreeIDE.xcarchive"
          APP=$(find "$ARCHIVE/Products/Applications" -name "*.app" | head -1)
          echo "Packaging: $APP"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr "AshtreeIDE.ipa" Payload/
          ls -la "$RUNNER_TEMP/AshtreeIDE.ipa"

      - name: Upload to TestFlight
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          RESULT=$(xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/AshtreeIDE.ipa" \
            --apiKey "NQXQ595W59" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --apiKeyPath ~/.appstoreconnect/private_keys/AuthKey_NQXQ595W59.p8 \
            --verbose 2>&1)
          echo "$RESULT"
          if echo "$RESULT" | grep -iE "UPLOAD FAILED|State_Error|Validation failed" | grep -v "No errors"; then
            echo "Upload failed"; exit 1
          fi
          echo "✓ Build ${{ env.BUILD_NUMBER }} uploaded to TestFlight"
